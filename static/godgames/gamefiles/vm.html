            box-sizing: border-box;
            flex-direction: column;
            gap: 20px;
            background: #000;
        }

        .launch-button:disabled {
            cursor: wait;
            opacity: 0.85;
        }
        .status-row {
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            width: 22px;
            height: 22px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 999px;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        .spinner.visible {
            display: inline-block;
        }
        .status-text {
            display: none;
            color: #fff3c0;
            font-size: 0.95rem;
        }
        .status-text.visible {
            display: inline;
        }
        
        .frame-actions {
            position: absolute;
            top: -18px;
            right: 18px;
            z-index: 2;
            display: flex;
            gap: 8px;
        }

        .frame-shell {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    padding: 0; 
    margin: 0;
}

.frame-shell.visible {
    display: block;
}

.frame-stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

.session-container {
    width: 100%;
    height: 100%;
    border: none; 
    border-radius: 0;
    background: #000;
    overflow: hidden;
}

        .refresh-button,
        .fullscreen-button {
            border: 0;
            border-radius: 14px 14px 0 0;
            padding: 9px 14px 11px;
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
            line-height: 1;
        }
        .refresh-button {
            background: linear-gradient(135deg, #4a4a4a 0%, #1f1f1f 100%);
        }
        .fullscreen-button {
            background: linear-gradient(135deg, #5f5f5f 0%, #2c2c2c 100%);
        }
        
        .session-surface {
            width: 100%;
            height: 100%;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
